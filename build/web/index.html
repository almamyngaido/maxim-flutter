<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Diwane — Trouvez votre bien immobilier au Sénégal. Appartements, villas, bureaux à Dakar, Thiès et partout au Sénégal.">
  <meta name="keywords" content="immobilier Sénégal, appartement Dakar, villa Dakar, location Dakar, achat immobilier Sénégal">

  <!-- Open Graph -->
  <meta property="og:title" content="Diwane — Immobilier au Sénégal">
  <meta property="og:description" content="Des milliers de biens immobiliers au Sénégal. Trouvez votre appartement, villa ou bureau.">
  <meta property="og:type" content="website">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Diwane">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Diwane — Immobilier au Sénégal</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #1B2A4A;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #1B2A4A;
    }
    #loading .logo {
      font-family: sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: white;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #E8703A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">Diwane</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
